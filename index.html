<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finder</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main id="viewer">

        <!-- 白黒画像 -->
        <img id="page-bw" draggable="false" alt="Finder page">

        <!-- カラー画像読み込み用。表示はcanvas側で行う -->
        <img id="page-color" draggable="false" alt="">

        <!-- 色演出用 -->
        <canvas id="effect-canvas"></canvas>

        <!-- ページ送り -->
        <button id="prev-button" class="page-button page-button-left" type="button" aria-label="前のページ">
            ‹
        </button>

        <button id="next-button" class="page-button page-button-right" type="button" aria-label="次のページ">
            ›
        </button>

    </main>

    <script src="script.js"></script>

</body>

</html>
