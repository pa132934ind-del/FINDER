<!DOCTYPE html>
<html lang="ja" translate="no" class="notranslate">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Finder</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main id="viewer">

        <img id="page-bw" draggable="false" alt="Finder page">

        <img id="page-color" draggable="false" alt="">

        <canvas id="effect-canvas"></canvas>

        <!-- cover専用：水彩にじみ -->
        <img id="cover-suisai" class="cover-layer" draggable="false" alt="">

        <!-- cover専用：i画像。RGBずらし用に同じ画像を重ねる -->
        <img id="cover-i-main" class="cover-layer cover-i-layer" draggable="false" alt="">
        <img id="cover-i-red" class="cover-layer cover-i-rgb" draggable="false" alt="">
        <img id="cover-i-blue" class="cover-layer cover-i-rgb" draggable="false" alt="">

        <!-- cover専用：透明な開始ボタン -->
        <button id="cover-start-button" type="button" aria-label="Finderを開始"></button>

        <!-- cover専用：しばらく操作がない時のヒント -->
<div id="cover-hint" class="notranslate" translate="no" aria-hidden="true">i に触れてください</div>
        <button id="prev-button" class="page-button page-button-left" type="button" aria-label="前のページ">
            ‹
        </button>

        <button id="next-button" class="page-button page-button-right" type="button" aria-label="次のページ">
            ›
        </button>

    </main>

    <script src="script.js"></script>

</body>

</html>
